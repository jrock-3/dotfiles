# ─── General ──────────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 2
set -g renumber-windows on
set -s escape-time 0        # no delay after pressing Escape (instant mode switching in vim)
set -g history-limit 30000
set -g mouse on

# ─── Prefix ──────────────────────────────────────────────────────────
# C-a locally, C-b over SSH — avoids conflicts in nested sessions
if-shell '[ -n "$SSH_CONNECTION" ]' \
    'set -g prefix C-b; bind C-b send-prefix' \
    'set -g prefix C-a; unbind C-b; bind C-a send-prefix'

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─── Navigation (vim-style) ──────────────────────────────────────────
setw -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r M-h resize-pane -L 5
bind-key -r M-j resize-pane -D 5
bind-key -r M-k resize-pane -U 5
bind-key -r M-l resize-pane -R 5

# New splits inherit the current pane's working directory
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# ─── Popups ──────────────────────────────────────────────────────────
bind C-j display-popup -xC -yC -w 80% -h 75% -E \
    "tmux list-sessions | sed -E 's/:.*$//' | fzf --reverse | xargs tmux switch-client -t"

bind C-f display-popup -xC -yC -w 80% -h 75% -E \
    "tmux list-windows -aF '#W (#S:#I)' | fzf --reverse | sed -E 's|.+ \\(||;s|\\)||' | xargs tmux switch-client -t"

bind-key C-t if-shell -F '#{==:#{session_name},popup}' {
    detach-client
} {
    display-popup -d "#{pane_current_path}" -xC -yC -w 80% -h 75% -E \
        'tmux attach-session -t popup || tmux new-session -s popup'
}

bind-key C-g display-popup -d "#{pane_current_path}" -xC -yC -w 80% -h 75% -E 'lazygit'

# ─── Plugins ─────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# ─── Theme (Catppuccin) ──────────────────────────────────────────────
set -g status-position top
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "rounded"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_text " #{window_name}"
set -g @catppuccin_window_current_text " #{window_name}"
set -g @catppuccin_directory_text "#{pane_current_path}"
set -g @catppuccin_session_text "#{session_name}"

# ─── Init (must be last) ─────────────────────────────────────────────
if-shell '[ -f ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux ]' \
    'run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'
if-shell '[ -f ~/.config/tmux/plugins/tpm/tpm ]' \
    'run ~/.config/tmux/plugins/tpm/tpm'
